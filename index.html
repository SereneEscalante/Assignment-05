<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title -->
    <title>GitHub Issues Tracker</title>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- taiwind + css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css -->
    <link rel="stylesheet" href="./style.css">

</head>
<body class="bg-gray-50 text-slate-800">

    <!-- login form -->
    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full rounded-xl p-10 bg-white shadow-md">
            <div class="text-center mb-8">

                <!-- logo -->
                <div class="flex justify-center mb-4">
                    <img src="./assets/github-logo.png" alt="" class="w-16 h-16 object-contain">
                </div>
                <h1 class="font-bold text-[24px]">GitHub Issues Tracker</h1>
                <p class="text-[#647488] text-[16px]">Sign in to manage your issues</p>
            </div>

            <!-- form -->
            <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1"></label>
                <input type="text" id="username" placeholder="Enter Username" class="w-full border p-3 rounded-lg border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                <span class="text-xs text-[#4A00FF]">Default:admin</span>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="w-full border p-3 rounded-lg border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                <span class="text-xs text-[#4A00FF]">Default:admin123</span>
            </div>

            <button type="submit" class="w-full bg-[#4A00FF] text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Sign In</button>
            </form>

            <!-- or part -->
            <div class="mt-8 pt-6 border-t text-center">
                <p class="text-xs text-[#1F2937] mb-4">OR</p>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-xs text-[#64748B]">Demo Credentials:</p>
                    <p class="text-sm font-bold">Username: 
                        <span class="text-[#1F2937] font-normal">admin</span>
                    </p>
                    <p class="text-sm font-bold">Password: 
                        <span class="text-[#1F2937] font-normal">admin123</span>
                    </p>
                </div>
            </div>
        </div>
    </div>


    <!-- 2nd part -->
    <div id="dashboard" class="hidden">
        <nav class="bg-white border-b px-6 py-3 flex flex-wrap justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <i class="fab fa-github text-2xl"></i>
                <span class="font-bold text-lg">GitHub Issues Tracker</span>
            </div>
            <div>
                <div>
                    <!-- ... -->
                    <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="search-input" placeholder="Search issues..." class="w-full pl-10 pr-4 py-2 border rounded-lg bg-gray-50 outline-none">
                </div>
                <button class="bg-[#4A00FF] text-white px-4 py-2 rounded-lg font-semibold whitespace-nowrap">+ New Issue</button>
            </div>
        </nav>

        <!-- all . open . closed -->
        <main class="max-w-7xl mx-auto p-6">
            <div class="max-w-7xl mx-auto p-6">
                <div class="flex gap-2 mb-8 items-center">
                    <button onclick="filterIssues('all')" id="tab-all" class="tab-btn active-tab px-6 py-2 rounded-lg font-medium border border-transparent transition text-sm"></button>

                    <button onclick="filterIssues('open')" id="tab-open" class="tab-btn px-6 py-2 rounded-lg font-medium text-[#64748B] hover:text-[#111827]
                    border border-gray-100 hover:border-gray-200 bg-white transition text-sm">Open</button>

                    <button onclick="filterIssues('closed')" id="tab-closed" class="tab-btn px-6 py-2 rounded-lg font-medium text-[#64748B] hover:text-[#111827]
                    border border-gray-100 hover:border-gray-200 bg-white transition text-sm">Closed</button>
                </div>   
            </div>

            <div class="bg-white border rounded-xl p-6 mb-8 flex justify-between items-center shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center">
                        <img src="./assets/Aperture.png" alt="" class="w-8 h-8 object-contain">
                    </div>

                    <div>
                        <h2 id="issue-count" class="text-xl font-bold">0 Issues</h2>
                        <p class="text-[#64748B] text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-4 text-sm font-medium">
                    <span class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>Open
                    </span>
                    <span class="flex items-center gap-2">
                        <div  class="w-3 h-3 rounded-full bg-[#A855F7]"></div>Closed
                    </span>
                </div>
            </div>

            <div id="loader" class="text-center py-20 hidden">
                <div class="animate-spin inline-block w-10 h-10 border-4 border-[#6366F1] border-t-transparent rounded-full"></div>
            </div>
            <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>


    <!-- 3rd part -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-8 shadow-2xl">
            <div id="modal-content"></div>
            <div class="mt-8 flex justify-end">
                <button onclick="closeModal()" class="bg-[#4A00FF] text-white px-8 py-2 rounded-lg font-bold">Close</button>
            </div>
        </div>
    </div>


    <script src="./script.js"></script>
</body>
</html>
