<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title -->
    <title>GitHub Issues Tracker</title>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- taiwind + css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css -->
    <link rel="stylesheet" href="./style.css">

</head>
<body class="bg-gray-50 text-slate-800">

    <!-- login form -->
    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full border-10 rounded-xl p-10 bg-white shadow-md">
            <div class="text-center mb-8">
                <!-- logo -->
                <img src="./assets/github-logo.png" alt="" class="w-16 h-16 object-contain">
                <h1 class="font-bold text-[24px]">GitHub Issues Tracker</h1>
                <p class="text-[#647488] text-[16px]">Sign in to manage your issues</p>
            </div>

            <!-- form -->
            <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1"></label>
                <input type="text" id="username" placeholder="Enter Username" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <span class="text-xs text-[#4A00FF]">Default:admin</span>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <span class="text-xs text-[#4A00FF]">Default:admin123</span>
            </div>
            <button type="submit" class="w-full bg-[#4A00FF] text-white py-3 rouded-lg font-bold hover:bg-indigo-700 transition">Sign In</button>
            </form>
            <!-- or part -->
            <div class="mt-8 pt-6 border-t text-center">
                <p class="text-xs text-[#1F2937] mb-4">OR</p>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-xs text-[#64748B]">Demo Credentials:</p>
                    <p class="text-sm font-bold">Username: admin</p>
                    <p class="text-sm font-bold">Password: admin123</p>
                </div>
            </div>
        </div>
    </div>



    <script src="./script.js"></script>
</body>
</html>
